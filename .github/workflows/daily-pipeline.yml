name: surge-daily-pipeline

# Token-free daily automation: replaces the Claude Code routines with GitHub Actions.
# The whole pipeline (crawl → score → evolve → judge → record) is deterministic Python
# with ZERO LLM calls, so it runs free inside GitHub's runners. The SQLite archive is
# NOT committed to main — it is restored from and persisted to the orphan `data` branch
# (single-commit snapshot, force-pushed, shrink-guarded). main stays code-only.

on:
  schedule:
    # GitHub cron is UTC. Two market-aligned runs (steps are idempotent — overlap is safe):
    - cron: "30 13 * * 1-5"   # 13:30 UTC = US pre-market / post-Asia-close → generate duel calls
    - cron: "0 0 * * 2-6"     # 00:00 UTC = post-US-close → score outcomes + self-improve loop
  workflow_dispatch: {}        # manual "Run workflow" button (on-demand)

permissions:
  contents: write              # allow the job to commit the updated SQLite state back
  pages: write                 # publish the static read-only site (Phase 2)
  id-token: write              # OIDC token for actions/deploy-pages

concurrency:
  group: surge-pipeline
  cancel-in-progress: false    # never interrupt a run mid-write (DB integrity)

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # NO LLM. The daily pipeline is 100% deterministic — keep ANTHROPIC empty so nothing
      # ever reaches for a paid model (a leftover value also breaks the gateway; see CLAUDE.md).
      SURGE_ANTHROPIC_API_KEY: ""
      # Token-free data sources. Add each in: repo → Settings → Secrets and variables → Actions.
      SURGE_FINNHUB_API_KEY:      ${{ secrets.SURGE_FINNHUB_API_KEY }}
      SURGE_ALPHAVANTAGE_API_KEY: ${{ secrets.SURGE_ALPHAVANTAGE_API_KEY }}
      SURGE_NAVER_CLIENT_ID:      ${{ secrets.SURGE_NAVER_CLIENT_ID }}
      SURGE_NAVER_CLIENT_SECRET:  ${{ secrets.SURGE_NAVER_CLIENT_SECRET }}
      SURGE_OPENDART_API_KEY:     ${{ secrets.SURGE_OPENDART_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Restore the SQLite archive from the data branch
        # The 84MB archive lives on the orphan `data` branch, NOT main (main is
        # code only). Pull it in; verify it opens with schema, else discard so
        # `surge init` recreates it (bootstrap). A missing/invalid restore is
        # caught by the persist step's shrink guard, which refuses to overwrite
        # the branch with a smaller DB — so a bad restore FAILS the run instead
        # of destroying the accumulated archive.
        run: |
          mkdir -p data
          if git fetch --depth=1 origin data 2>/dev/null; then
            git cat-file -p origin/data:surge.db > data/surge.db \
              && echo "restored $(stat -c%s data/surge.db) bytes from data branch"
          else
            echo "no data branch yet — bootstrap fresh"
          fi
          python3 -c "import sqlite3,sys; sys.exit(0 if sqlite3.connect('data/surge.db').execute('SELECT count(*) FROM sqlite_master').fetchone()[0]>0 else 1)" 2>/dev/null \
            || { echo "archive missing/invalid — re-init schema"; rm -f data/surge.db; }

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install (core + KR extra; NO llm extra ⇒ no anthropic, stays token-free)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[kr]"    # [kr]=finance-datareader+pykrx for rotation; omit [llm]

      - name: Run the deterministic daily pipeline
        # set +e: one slow/throttled vendor must not abort the rest — the pipeline is
        # degrade-safe by design (CLAUDE.md §7). Each command no-ops if its inputs aren't ready.
        run: |
          set +e
          surge init
          surge snapshot
          surge backfill-outcomes
          surge duel-archive       # keep price_history current — the adaptive
                                   # engine trains on it before every shadow call
          surge duel --pair all
          surge adaptive --calibrate --offline --pair all   # 확신 구간 원장 갱신
          surge rotation
          surge rotation-eval
          surge kr-factors --backfill --days 45   # KR 섀도 팩터 원장 전진+채점
                                   # (검색급등/policy_tagged가 +10%/T+5를 선별하는가;
                                   # 로컬 루틴 은퇴 후 파이프라인이 유일 갱신자)
          surge daily            # score → evolve → judge → record (learning_log)
          exit 0

      - name: Persist the archive to the data branch (fail-safe, never shrinks)
        # Single-commit orphan snapshot, force-pushed to `data`. Shrink guard:
        # never overwrite the branch with a DB < 90% of what's already there —
        # a truncated run or failed restore fails the job VISIBLY instead of
        # clobbering the accumulated archive. Plumbing (hash-object/mktree/
        # commit-tree) keeps the branch a single commit (no history bloat).
        run: |
          git config user.name  "surge-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          test -s data/surge.db || { echo "::error::no surge.db to persist"; exit 1; }
          new=$(stat -c%s data/surge.db)
          git fetch --depth=1 origin data 2>/dev/null || true
          old=$(git cat-file -s origin/data:surge.db 2>/dev/null || echo 0)
          if [ "$old" -gt 0 ] && [ "$new" -lt "$((old * 90 / 100))" ]; then
            echo "::error::archive shrink guard: new ${new}B < 90% of existing ${old}B — refusing to persist"
            exit 1
          fi
          blob=$(git hash-object -w data/surge.db)
          tree=$(printf '100644 blob %s\tsurge.db\n' "$blob" | git mktree)
          commit=$(git commit-tree "$tree" -m "chore(data): pipeline run $(date -u +'%Y-%m-%dT%H:%MZ')")
          git push --force origin "$commit:refs/heads/data"
          echo "persisted ${new}B to data branch (was ${old}B)"

  # PHASE 2 (wired 2026-07-09): publish tonight's calls + verification ledgers as a
  # static read-only page, so the daily results are viewable from any phone at the
  # repo's Pages URL. One-time setup: repo Settings → Pages → Source: GitHub Actions.
  pages:
    needs: pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main            # code only — the DB lives on the data branch

      - name: Restore the SQLite archive from the data branch
        # the pipeline job persisted the fresh DB to `data`; pull it in so the
        # exported page reflects tonight's run. Degrade-safe: no branch → empty
        # page (never crashes).
        run: |
          mkdir -p data
          if git fetch --depth=1 origin data 2>/dev/null; then
            git cat-file -p origin/data:surge.db > data/surge.db \
              && echo "restored $(stat -c%s data/surge.db) bytes for export"
          else
            echo "no data branch — exporting empty page"
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Export the static site from the fresh DB
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          surge pages-export --out site

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
